  name: "💻 Workstations"
  policies:
    - path: ../lib/../lib/windows/policies/antivirus-updated.policies.yml
    - path: ../lib/macos/policies/dns-resolvers.policies.yml
  reports:
  agent_options:
  controls:
    macos_settings:
      custom_settings:
        - path: ../lib/macos/configuration-profiles/disable-bluetooth-file-sharing.mobileconfig
          labels_include_all:
            - "Department: Engineering"
        - path: ../lib/ios/configuration-profiles/passcode-settings.json
          labels_exclude_any:
            - C-Suite
    macos_updates:
      deadline: "2026-04-30"
      minimum_version: "26.0"
    ipados_updates:
      deadline: "2026-06-30"
      minimum_version: "26.2"
    scripts:
      - path: ../lib/windows/scripts/set-wallpaper.ps1
      - path: ../lib/macos/scripts/set-dns-cloudflare.sh
    enable_disk_encryption: true
  software:
    packages:
      - path: ../lib/macos/software/zoom.yml
        self_service: true
        setup_experience: true
  settings:
    secrets:
      - secret: "$FLEET_WORKSTATIONS_ENROLL_SECRET"
