# default.yml controls global settings and policies/reports that run on all hosts ("All fleets").

policies:
reports:
agent_options:
controls:
org_settings:
  fleet_desktop:
    transparency_url: https://catoftheday.com
  host_expiry_settings:
    host_expiry_enabled: true 
    host_expiry_window: 30
  server_settings:
    server_url: $FLEET_URL
  org_info:
    org_name: Dunder Mifflin, Inc. 
  secrets:
    - secret: "$FLEET_GLOBAL_ENROLL_SECRET"
  webhook_settings:
    activities_webhook:
      enable_activities_webhook: true
      destination_url: https://webhook.site/6ba79cb4-19fd-487d-b112-47ac238c90ef
